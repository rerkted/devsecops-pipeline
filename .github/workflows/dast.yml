# ─── .github/workflows/dast.yml ──────────────────────────────────
# Reusable DAST workflow — OWASP ZAP baseline scan
# Runs against a live application after deployment
# Aligns with: OWASP DevSecOps Guidelines + OWASP SAMM Verification Level 2
#
# Usage from calling repo (post-deploy):
#   dast:
#     needs: verify
#     uses: rerkted/devsecops-pipeline/.github/workflows/dast.yml@main
#     with:
#       target-url: https://rerktserver.com
#       severity-threshold: HIGH   # LOW | MEDIUM | HIGH | NONE
#     permissions:
#       contents: read
#       issues: write

name: DAST Scan

on:
  workflow_call:
    inputs:
      target-url:
        description: 'URL of the live application to scan'
        type: string
        required: true
      severity-threshold:
        description: 'Minimum severity that fails the pipeline: LOW | MEDIUM | HIGH | NONE'
        type: string
        required: false
        default: 'HIGH'

jobs:
  owasp-zap:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: ZAP baseline scan
        run: |
          # Run ZAP directly — action-baseline@v0.12.0 hardcodes invalid '-l High'
          # Valid ZAP -l values: PASS, IGNORE, INFO, WARN, FAIL
          # -I = do not return failure on WARN (medium); only FAIL-level alerts exit non-zero
          set +e
          docker run \
            --user root \
            -v ${{ github.workspace }}:/zap/wrk/:rw \
            --network=host \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
              -t "${{ inputs.target-url }}" \
              -r report_html.html \
              -J report_json.json \
              -w report_md.md \
              -a -I -l WARN
          ZAP_EXIT=$?
          set -e

          if [ "${{ inputs.severity-threshold }}" = "NONE" ]; then
            echo "NONE threshold — scan complete, not blocking pipeline"
            exit 0
          fi
          exit $ZAP_EXIT

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-${{ github.run_number }}
          path: |
            report_html.html
            report_json.json
          retention-days: 30
