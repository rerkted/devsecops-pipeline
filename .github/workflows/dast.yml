# ─── .github/workflows/dast.yml ──────────────────────────────────
# Reusable DAST workflow — OWASP ZAP baseline scan
# Runs against a live application after deployment
# Aligns with: OWASP DevSecOps Guidelines + OWASP SAMM Verification Level 2
#
# Usage from calling repo (post-deploy):
#   dast:
#     needs: verify
#     uses: rerkted/devsecops-pipeline/.github/workflows/dast.yml@main
#     with:
#       target-url: https://rerktserver.com
#       severity-threshold: HIGH   # LOW | MEDIUM | HIGH | NONE
#     permissions:
#       contents: read
#       issues: write

name: DAST Scan

on:
  workflow_call:
    inputs:
      target-url:
        description: 'URL of the live application to scan'
        type: string
        required: true
      severity-threshold:
        description: 'Minimum severity that fails the pipeline: LOW | MEDIUM | HIGH | NONE'
        type: string
        required: false
        default: 'HIGH'

jobs:
  owasp-zap:
    name: DAST (OWASP ZAP)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve ZAP fail action
        id: zap-config
        run: |
          # ZAP fail_action controls the -I flag:
          #   true  = fail on WARN and above (Medium+)
          #   false = fail on FAIL only (High) — adds -I flag internally
          # NONE threshold uses continue-on-error on the scan step instead
          case "${{ inputs.severity-threshold }}" in
            LOW|MEDIUM) echo "fail=true"  >> $GITHUB_OUTPUT ;;
            HIGH)       echo "fail=false" >> $GITHUB_OUTPUT ;;
            NONE)       echo "fail=false" >> $GITHUB_OUTPUT ;;
            *)          echo "fail=false" >> $GITHUB_OUTPUT ;;
          esac

      - name: ZAP baseline scan
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: ${{ inputs.severity-threshold == 'NONE' }}
        with:
          target: ${{ inputs.target-url }}
          fail_action: ${{ steps.zap-config.outputs.fail }}
          cmd_options: '-a'

      - name: Upload ZAP HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-${{ github.run_number }}
          path: report_html.html
          retention-days: 30
