# ─── .github/workflows/security.yml ──────────────────────────────
# Reusable security scanning workflow
# Covers: Secrets (GitLeaks), IaC (Checkov), SCA (npm audit), SAST (CodeQL)
# Aligns with: OWASP DevSecOps Guidelines + OWASP SAMM Verification Level 2
#
# Usage from calling repo:
#   security:
#     uses: rerkted/devsecops-pipeline/.github/workflows/security.yml@main
#     with:
#       terraform-dir: terraform
#       node-dirs: '. chat bedrock'
#       severity-threshold: HIGH   # LOW | MEDIUM | HIGH | CRITICAL | NONE
#     permissions:
#       security-events: write
#       actions: read
#       contents: read

name: Security Scans

on:
  workflow_call:
    inputs:
      terraform-dir:
        description: 'Path to Terraform directory (leave empty to skip IaC scan)'
        type: string
        required: false
        default: 'terraform'
      node-dirs:
        description: 'Space-separated list of Node.js app directories for SCA'
        type: string
        required: false
        default: '.'
      language:
        description: 'CodeQL language to scan (javascript, python, go, etc.)'
        type: string
        required: false
        default: 'javascript'
      severity-threshold:
        description: 'Minimum severity that fails the pipeline: LOW | MEDIUM | HIGH | CRITICAL | NONE'
        type: string
        required: false
        default: 'HIGH'

jobs:
  # ── JOB 1: Secrets Scan ──────────────────────────────────────
  # Secrets always fail — a leaked credential has no acceptable severity
  secrets-scan:
    name: Secrets Scan (GitLeaks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: false

  # ── JOB 2: IaC Scan ──────────────────────────────────────────
  iac-scan:
    name: IaC Scan (Checkov)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Checkov
        run: pip install checkov -q

      - name: Run Checkov
        run: |
          # Map severity threshold to Checkov --soft-fail-on severities
          # Anything below the threshold is soft-failed (reported but not blocking)
          case "${{ inputs.severity-threshold }}" in
            CRITICAL) SOFT_FLAGS="--soft-fail-on LOW,MEDIUM,HIGH" ;;
            HIGH)     SOFT_FLAGS="--soft-fail-on LOW,MEDIUM" ;;
            MEDIUM)   SOFT_FLAGS="--soft-fail-on LOW" ;;
            LOW)      SOFT_FLAGS="" ;;
            NONE)     SOFT_FLAGS="--soft-fail" ;;
            *)        SOFT_FLAGS="--soft-fail-on LOW,MEDIUM" ;;
          esac

          checkov -d "${{ inputs.terraform-dir }}" \
            --framework terraform \
            $SOFT_FLAGS \
            -o sarif \
            --output-file-path . || true

          # Checkov writes results_tf.sarif — normalise filename
          [ -f results_tf.sarif ] && mv results_tf.sarif checkov-results.sarif \
            || echo '{"version":"2.1.0","runs":[{"tool":{"driver":{"name":"Checkov"}},"results":[]}]}' > checkov-results.sarif

      - name: Upload Checkov results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  # ── JOB 3: SCA — Dependency Scan ─────────────────────────────
  sca:
    name: SCA — Dependency Scan (npm audit)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run npm audit across all app directories
        run: |
          # Map severity threshold to npm audit --audit-level
          # npm uses "moderate" where we say "medium"
          case "${{ inputs.severity-threshold }}" in
            CRITICAL) LEVEL=critical ;;
            HIGH)     LEVEL=high ;;
            MEDIUM)   LEVEL=moderate ;;
            LOW)      LEVEL=low ;;
            NONE)     LEVEL=none ;;
            *)        LEVEL=high ;;
          esac

          EXIT_CODE=0
          for dir in ${{ inputs.node-dirs }}; do
            if [ -f "$dir/package.json" ]; then
              echo "── Scanning $dir (audit-level=$LEVEL) ──"
              cd "$dir"
              if [ "$LEVEL" = "none" ]; then
                npm audit --audit-level=critical || true
              else
                npm audit --audit-level=$LEVEL || EXIT_CODE=$?
              fi
              cd - > /dev/null
            fi
          done
          exit $EXIT_CODE

  # ── JOB 4: SAST ──────────────────────────────────────────────
  # CodeQL findings go to the GitHub Security tab for review
  # Pipeline blocks only if CodeQL itself fails to run
  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect source files for language
        id: detect
        run: |
          case "${{ inputs.language }}" in
            javascript)
              COUNT=$(find . -name "*.js" -o -name "*.ts" | grep -v node_modules | grep -v ".git" | wc -l)
              ;;
            python)
              COUNT=$(find . -name "*.py" | grep -v ".git" | wc -l)
              ;;
            go)
              COUNT=$(find . -name "*.go" | grep -v ".git" | wc -l)
              ;;
            *)
              COUNT=0
              ;;
          esac
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" -gt 0 ]; then
            echo "Found $COUNT source file(s) for ${{ inputs.language }} — running CodeQL"
          else
            echo "No ${{ inputs.language }} source files found — skipping CodeQL"
          fi

      - name: Initialize CodeQL
        if: steps.detect.outputs.count > 0
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ inputs.language }}

      - name: Autobuild
        if: steps.detect.outputs.count > 0
        uses: github/codeql-action/autobuild@v3

      - name: Run CodeQL analysis
        if: steps.detect.outputs.count > 0
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ inputs.language }}"
