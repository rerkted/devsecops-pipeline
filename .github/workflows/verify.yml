# ─── .github/workflows/verify.yml ────────────────────────────────
# Reusable verify workflow
# Checks: HTTP health endpoint (public services) + container status via SSM
#
# Usage from calling repo:
#   verify:
#     needs: deploy
#     uses: rerkted/devsecops-pipeline/.github/workflows/verify.yml@main
#     with:
#       ssm-instance-param: /rerktserver/grafana/instance-id
#       compose-dir: /home/ec2-user/aws-grafana
#       role-arn: arn:aws:iam::123456789012:role/github-actions-oidc-role
#     permissions:
#       id-token: write
#       contents: read

name: Verify

on:
  workflow_call:
    inputs:
      target-url:
        description: 'Public URL for HTTP health check (omit if IP-restricted)'
        type: string
        required: false
        default: ''
      health-path:
        description: 'Health check path'
        type: string
        required: false
        default: '/health'
      ssm-instance-param:
        description: 'SSM parameter name for EC2 instance ID (container status check)'
        type: string
        required: false
        default: ''
      compose-dir:
        description: 'Docker Compose working directory on EC2'
        type: string
        required: false
        default: ''
      role-arn:
        description: 'IAM role ARN to assume via OIDC'
        type: string
        required: true
      aws-region:
        description: 'AWS region'
        type: string
        required: false
        default: 'us-east-1'

jobs:
  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: HTTP health check
        if: inputs.target-url != ''
        run: |
          URL="${{ inputs.target-url }}${{ inputs.health-path }}"
          echo "Checking $URL"
          STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "$URL")
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed — HTTP $STATUS"
          else
            echo "Health check failed — HTTP $STATUS"
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        if: inputs.ssm-instance-param != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Verify containers running via SSM
        if: inputs.ssm-instance-param != ''
        run: |
          INSTANCE_ID=$(aws ssm get-parameter \
            --name "${{ inputs.ssm-instance-param }}" \
            --query "Parameter.Value" --output text)

          CMD="docker compose ps --status exited | tail -n +2 | wc -l"
          if [ -n "${{ inputs.compose-dir }}" ]; then
            CMD="cd ${{ inputs.compose-dir }} && $CMD"
          fi

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="[\"$CMD\"]" \
            --query "Command.CommandId" --output text)

          sleep 15

          EXITED=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text | tr -d '[:space:]')

          if [ "$EXITED" = "0" ]; then
            echo "All containers running"
          else
            echo "$EXITED container(s) exited unexpectedly"
            exit 1
          fi
