# ─── .github/workflows/cleanup.yml ───────────────────────────────
# Reusable cleanup workflow
# Prunes unused Docker images and volumes on EC2 to reclaim disk space
#
# Usage from calling repo:
#   cleanup:
#     needs: verify
#     uses: YOUR_GITHUB_ORG/devsecops-pipeline/.github/workflows/cleanup.yml@main
#     with:
#       ssm-instance-param: /YOUR_SSM_NAMESPACE/grafana/instance-id
#       role-arn: arn:aws:iam::123456789012:role/github-actions-oidc-role
#     permissions:
#       id-token: write
#       contents: read

name: Cleanup

on:
  workflow_call:
    inputs:
      ssm-instance-param:
        description: 'SSM parameter name for EC2 instance ID'
        type: string
        required: true
      aws-region:
        description: 'AWS region'
        type: string
        required: false
        default: 'us-east-1'
    secrets:
      role-arn:
        description: 'IAM role ARN to assume via OIDC'
        required: true

jobs:
  cleanup:
    name: Cleanup EC2
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Prune unused Docker images and volumes on EC2
        run: |
          INSTANCE_ID=$(aws ssm get-parameter \
            --name "${{ inputs.ssm-instance-param }}" \
            --query "Parameter.Value" --output text)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='["docker image prune -f && docker volume prune -f"]' \
            --query "Command.CommandId" --output text)

          echo "SSM Command ID: $COMMAND_ID"

          for i in $(seq 1 60); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "[$i/60] Status: $STATUS"
            if [ "$STATUS" = "Success" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ]; then
              break
            fi
          done

          OUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text)
          echo "$OUT"

          if [ "$STATUS" != "Success" ]; then
            echo "Cleanup failed with status: $STATUS"
            exit 1
          fi
