# ─── .github/workflows/cleanup.yml ───────────────────────────────
# Reusable cleanup workflow
# Prunes unused Docker images and volumes on EC2 to reclaim disk space
#
# Usage from calling repo:
#   cleanup:
#     needs: verify
#     uses: rerkted/devsecops-pipeline/.github/workflows/cleanup.yml@main
#     with:
#       ssm-instance-param: /rerktserver/grafana/instance-id
#       role-arn: arn:aws:iam::123456789012:role/github-actions-oidc-role
#     permissions:
#       id-token: write
#       contents: read

name: Cleanup

on:
  workflow_call:
    inputs:
      ssm-instance-param:
        description: 'SSM parameter name for EC2 instance ID'
        type: string
        required: true
      role-arn:
        description: 'IAM role ARN to assume via OIDC'
        type: string
        required: true
      aws-region:
        description: 'AWS region'
        type: string
        required: false
        default: 'us-east-1'

jobs:
  cleanup:
    name: Cleanup EC2
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ inputs.role-arn }}
          aws-region: ${{ inputs.aws-region }}

      - name: Prune unused Docker images and volumes on EC2
        run: |
          INSTANCE_ID=$(aws ssm get-parameter \
            --name "${{ inputs.ssm-instance-param }}" \
            --query "Parameter.Value" --output text)

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands='["docker image prune -f && docker volume prune -f"]' \
            --query "Command.CommandId" --output text)

          sleep 15

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)

          OUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text)

          echo "$OUT"

          if [ "$STATUS" != "Success" ]; then
            echo "Cleanup failed with status: $STATUS"
            exit 1
          fi
